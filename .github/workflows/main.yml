name: Docker Publish

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set image tag
        id: version
        shell: bash
        run: |
          BASE_TAG="v$(date -u +'%y.%m.%d')"
          TAG="$BASE_TAG"
          COUNT=0

          git fetch --tags --force

          while git rev-parse "$TAG" >/dev/null 2>&1; do
            COUNT=$((COUNT + 1))
            TAG="${BASE_TAG}-${COUNT}"
          done

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

      - name: Generate release notes
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          {
            echo "## Docker Images"
            echo
            echo "- \`kmw0410/pastebox:latest\`"
            echo "- \`kmw0410/pastebox:${TAG}\`"
            echo
            echo "## Changes"
            echo

            if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
              git log "${BEFORE}..${AFTER}" --pretty=format:"- %s (%h)" --no-merges
            else
              git log -1 --pretty=format:"- %s (%h)" --no-merges
            fi

            echo
            echo
            echo "## Supported Platforms"
            echo
            echo "- linux/amd64"
            echo "- linux/arm64"
          } > release-notes.md

          cat release-notes.md

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            kmw0410/pastebox:latest
            kmw0410/pastebox:${{ steps.version.outputs.tag }}

      - name: Create git tag
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md
