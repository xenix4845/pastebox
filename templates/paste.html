<!doctype html>
<html lang="{{ t "_lang" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .ID }} - Pastebox</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <style>
    .paste-scrollbar {
      scrollbar-width: auto;
      scrollbar-color: rgba(161,161,170,0.95) rgba(255,255,255,0.08);
    }
    .paste-scrollbar::-webkit-scrollbar {
      height: 14px;
    }
    .paste-scrollbar::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
    }
    .paste-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(161,161,170,0.9);
      border: 3px solid rgba(255,255,255,0.08);
      border-radius: 8px;
    }
    .paste-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(212,212,216,0.95);
    }
    .paste-viewer {
      grid-template-columns: max-content;
    }
    .paste-viewer.show-lines {
      grid-template-columns: auto max-content;
      column-gap: 1rem;
    }
  </style>
</head>
<body class="min-h-screen bg-[#111111] text-zinc-100">
  <header class="sticky top-0 z-10 border-b border-white/10 bg-[#111111]/95 backdrop-blur">
    <div class="mx-auto flex max-w-[1920px] items-center justify-between gap-4 px-6 py-4">
      <div class="min-w-0">
        <p class="text-xs uppercase tracking-[0.24em] text-zinc-500">Pastebox</p>
        <div class="flex min-w-0 items-center gap-3">
          <h1 class="truncate font-mono text-lg font-semibold text-zinc-100">{{ .ID }}</h1>
          {{ if .Filename }}
          <span class="truncate text-sm text-zinc-500">{{ .Filename }}</span>
          {{ end }}
          <span class="rounded-full border border-white/10 px-2 py-0.5 text-xs text-zinc-500">{{ .Language }}</span>
        </div>
      </div>

      <div class="flex shrink-0 items-center gap-2">
        <button
          id="copyButton"
          type="button"
          class="rounded-lg border border-white/10 px-3 py-2 text-sm text-zinc-300 transition hover:border-white/20 hover:bg-white/[0.04] hover:text-white"
          onclick="copyPasteContent()"
        >
          {{ t "paste_copy" }}
        </button>
        <form method="post" action="/{{ .ID }}">
          {{ if .Password }}
          <input type="hidden" name="password" value="{{ .Password }}">
          {{ end }}
          <button
            type="submit"
            class="rounded-lg border border-white/10 px-3 py-2 text-sm text-zinc-300 transition hover:border-white/20 hover:bg-white/[0.04] hover:text-white"
          >
            {{ t "paste_clone" }}
          </button>
        </form>
        <button
          id="lineToggle"
          type="button"
          class="rounded-lg border border-white/10 px-3 py-2 text-sm text-zinc-300 transition hover:border-white/20 hover:bg-white/[0.04] hover:text-white"
          onclick="toggleLineNumbers()"
          aria-pressed="false"
        >
          {{ t "paste_line_numbers" }}
        </button>
        <a
          class="rounded-lg border border-white/10 px-3 py-2 text-sm text-zinc-300 transition hover:border-white/20 hover:bg-white/[0.04] hover:text-white"
          href="?raw=1"
        >
          {{ t "paste_raw" }}
        </a>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-[1920px] px-4 py-6 lg:px-6">
    <div class="paste-scrollbar w-full overflow-x-auto overflow-y-visible pb-5 [scrollbar-gutter:stable]">
      <div id="viewer" class="paste-viewer grid min-w-max gap-0 font-mono text-sm leading-6">
        <pre
          id="lineNumbers"
          aria-hidden="true"
          class="hidden min-w-12 select-none border-r border-white/10 pr-4 text-right text-zinc-600"
        ></pre>
        <pre class="m-0 min-w-max whitespace-pre text-zinc-200"><code id="pasteContent" class="language-{{ .Language }} bg-transparent p-0">{{ .Content }}</code></pre>
      </div>
    </div>
  </main>

  <script>
    const viewer = document.getElementById("viewer");
    const lineNumbers = document.getElementById("lineNumbers");
    const lineToggle = document.getElementById("lineToggle");
    const pasteContent = document.getElementById("pasteContent");
    const rawText = pasteContent.textContent || "";

    function renderLineNumbers() {
      const lineCount = Math.max(1, rawText.split("\n").length);
      lineNumbers.textContent = Array.from({ length: lineCount }, (_, index) => index + 1).join("\n");
    }

    function toggleLineNumbers() {
      const enabled = lineNumbers.classList.toggle("hidden") === false;

      viewer.classList.toggle("show-lines", enabled);
      lineToggle.classList.toggle("border-white/25", enabled);
      lineToggle.classList.toggle("bg-white/[0.07]", enabled);
      lineToggle.classList.toggle("text-white", enabled);
      lineToggle.setAttribute("aria-pressed", enabled ? "true" : "false");
    }

    renderLineNumbers();

    if (window.hljs && "{{ .Language }}" !== "logs") {
      hljs.highlightElement(pasteContent);
    }

    async function copyPasteContent() {
      const button = document.getElementById("copyButton");
      const content = rawText;

      try {
        await navigator.clipboard.writeText(content);
        button.innerText = "{{ t "paste_copied" }}";
      } catch (error) {
        const textarea = document.createElement("textarea");
        textarea.value = content;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
        button.innerText = "{{ t "paste_copied" }}";
      }

      setTimeout(() => {
        button.innerText = "{{ t "paste_copy" }}";
      }, 1500);
    }
  </script>
</body>
</html>
