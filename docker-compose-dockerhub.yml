services:
  pastebox:
    image: kmw0410/pastebox:latest
    container_name: pastebox
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Optional. Set this only if you want to override Alpine repositories inside the container.
      # Example: "https://example-mirror.com/alpine"
      MIRROR_URL: "https://mirror5.krfoss.org/alpine"
      # The default time zone is Asia/Seoul (GMT +9). Change it as needed.
      # TZ: "Asia/Seoul"
    volumes:
      - ./data:/paste-data
